<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign Language Detection</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='assets/logo1.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <div class="logo-section">
                    <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="Logo" class="header-logo">
                    <h1>Sign Language</h1>
                </div>
                <div class="status-section">
                    <div class="camera-toggle">
                        <span class="toggle-label">Camera</span>
                        <label class="switch">
                            <input type="checkbox" id="cameraSwitch" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="status-indicator">
                        <span class="status-dot" id="statusDot"></span>
                        <span class="status-text" id="statusText">Live</span>
                    </div>
                    <div class="time-display" id="currentTime"></div>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="camera-section">
                <div class="camera-container" id="cameraContainer">
                    <div class="camera-overlay">
                        <div class="scan-line"></div>
                    </div>
                    <img src="{{ url_for('video_feed') }}" class="video-feed" id="videoFeed" alt="Camera Feed">
                    <div class="camera-offlay" id="cameraOfflay">
                        <i class="fi fi-rr-camera"></i>
                        <span>Camera Off</span>
                    </div>
                    <div class="gesture-overlay" id="gestureOverlay">
                        <span id="liveGesture">Initializing...</span>
                    </div>
                </div>
            </div>

            <div class="side-panel">
                <div class="panel-card gesture-card">
                    <div class="card-header-custom">
                        <i class="fi fi-rr-hand"></i>
                        <h3>Current Gesture</h3>
                    </div>
                    <div class="card-body-custom">
                        <div class="gesture-display-container">
                            <div class="gesture-icon" id="gestureIcon">
                                <i class="fi fi-rr-hand-peace"></i>
                            </div>
                            <div class="gesture-text" id="currentGesture">--</div>
                        </div>
                        <div class="confidence-bar">
                            <div class="confidence-fill" id="confidenceBar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <div class="panel-card output-card">
                    <div class="card-header-custom">
                        <i class="fi fi-rr-comment-alt"></i>
                        <h3>Output Text</h3>
                        <button class="icon-btn" id="clearTextHeaderBtn" title="Clear all">
                            <i class="fi fi-rr-trash"></i>
                        </button>
                    </div>
                    <div class="card-body-custom">
                        <div class="output-container">
                            <div class="output-text" id="outputText">Ready to sign...</div>
                        </div>
                        <div class="text-stats">
                            <span class="stat-item">
                                <i class="fi fi-rr-text"></i>
                                <span id="charCount">0</span>
                            </span>
                            <span class="stat-item">
                                <i class="fi fi-rr-spell-check"></i>
                                <span id="wordCount">0</span>
                            </span>
                        </div>
                    </div>
                </div>

                <div class="panel-card controls-card">
                    <div class="card-header-custom">
                        <i class="fi fi-rr-settings"></i>
                        <h3>Controls</h3>
                    </div>
                    <div class="card-body-custom">
                        <div class="controls-grid">
                            <button class="control-btn primary" id="addGestureBtn">
                                <i class="fi fi-rr-plus-small"></i>
                                <span>Add</span>
                                <small>Enter</small>
                            </button>
                            <button class="control-btn secondary" id="addSpaceBtn">
                                <i class="fi fi-rr-space-shuttle"></i>
                                <span>Space</span>
                                <small>Space</small>
                            </button>
                            <button class="control-btn secondary" id="backspaceBtn">
                                <i class="fi fi-rr-delete"></i>
                                <span>Delete</span>
                                <small>⌫</small>
                            </button>
                            <button class="control-btn danger" id="clearTextBtn">
                                <i class="fi fi-rr-broom"></i>
                                <span>Clear</span>
                                <small>Esc</small>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="panel-card guide-card">
                    <div class="card-header-custom">
                        <i class="fi fi-rr-book-alt"></i>
                        <h3>Gesture Guide</h3>
                    </div>
                    <div class="card-body-custom">
                        <div class="guide-grid">
                            <div class="guide-item">
                                <span class="guide-gesture">A</span>
                                <span class="guide-desc">Fist</span>
                            </div>
                            <div class="guide-item">
                                <span class="guide-gesture">B</span>
                                <span class="guide-desc">Palm</span>
                            </div>
                            <div class="guide-item">
                                <span class="guide-gesture">C</span>
                                <span class="guide-desc">Curved</span>
                            </div>
                            <div class="guide-item">
                                <span class="guide-gesture">D</span>
                                <span class="guide-desc">Index</span>
                            </div>
                            <div class="guide-item">
                                <span class="guide-gesture">E</span>
                                <span class="guide-desc">Curl</span>
                            </div>
                            <div class="guide-item">
                                <span class="guide-gesture">F</span>
                                <span class="guide-desc">OK</span>
                            </div>
                        </div>
                        <div class="guide-note">
                            <i class="fi fi-rr-bulb"></i>
                            <span>Good lighting | Plain background</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="app-footer">
            <div class="footer-content">
                <div class="keyboard-hints">
                    <span class="hint"><kbd>␣</kbd> Space</span>
                    <span class="hint"><kbd>↵</kbd> Add</span>
                    <span class="hint"><kbd>⌫</kbd> Del</span>
                    <span class="hint"><kbd>Esc</kbd> Clear</span>
                </div>
                <div class="system-status">
                    <i class="fi fi-rr-shield-check"></i>
                    <span id="systemStatusText">Active</span>
                </div>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
